<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký</title>
  <link rel="stylesheet" href="./css/account.css">
</head>
<body>

<!-- Hình nền -->
<img src="./Img/Giaodien/nen.png" alt="Background" class="background-img">

<div class="container">
  <div class="card">
    <div class="icon">👤</div>
    <h3>Đăng ký tài khoản</h3>
    <p class="subtitle">Tạo tài khoản để mua sắm dễ dàng hơn</p>

    <form id="registerForm">
      <label for="regName">Họ tên:</label>
      <input type="text" id="regName" placeholder="Nhập tên của bạn" required>

      <label for="regEmail">Email:</label>
      <input type="email" id="regEmail" placeholder="Nhập email" required>

      <label for="regPassword">Mật khẩu:</label>
      <input type="password" id="regPassword" placeholder="Nhập mật khẩu" required>

      <label for="regRePassword">Nhập lại mật khẩu:</label>
      <input type="password" id="regRePassword" placeholder="Nhập lại mật khẩu" required>

      <button type="submit">Đăng ký</button>
    </form>

    <p class="signup-link">
      Đã có tài khoản?
      <a href="Dangnhap.html">Đăng nhập</a>
    </p>
  </div>
</div>

<script src="./Js/account.js"></script>
</body>
</html>
