<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập</title>
  <link rel="stylesheet" href="./css/account.css">
</head>
<body>

<!-- Hình nền -->
<img src="./Img/Giaodien/nen.png" alt="Background" class="background-img">

<div class="container">
  <div class="card">

    <div class="icon">💻</div>

    <h3>Đăng nhập</h3>
    <p class="subtitle">Chào mừng bạn quay lại Mooti Tea</p>

    <form id="loginForm">
      <label for="loginEmail">Email:</label>
      <input type="email" id="loginEmail" placeholder="Nhập email" required>

      <label for="loginPassword">Mật khẩu:</label>
      <input type="password" id="loginPassword" placeholder="Nhập mật khẩu" required>

      <button type="submit">Đăng nhập</button>
    </form>

    <p class="signup-link">
      Chưa có tài khoản?
      <a href="Dangky.html">Đăng ký ngay</a>
    </p>

  </div>
</div>

<script src="./Js/account.js"></script>
</body>
</html>
